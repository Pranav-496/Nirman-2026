<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AuthentiFy — AI-Powered Certificate Verification System for educational institutions. Verify academic certificates using OCR, SHA-256 hashing, and AI tampering detection." />
    <meta name="theme-color" content="#0C1222" />
    <meta name="keywords" content="certificate verification, academic, AI, OCR, SHA-256, tampering detection, AuthentiFy" />
    <title>AuthentiFy — AI Certificate Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      // Detect system preference before React mounts (prevents flash)
      (function() {
        var saved = localStorage.getItem('authentify-theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
        // Update theme-color meta tag
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) {
          tc.content = document.documentElement.getAttribute('data-theme') === 'light' ? '#F8FAFC' : '#0C1222';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
